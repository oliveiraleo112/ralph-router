version: "3.8"

services:
  dashboard-api:
    build:
      context: ./agrofel-dashboard-api
    env_file: .env
    expose:
      - "8000"
    networks:
      - minha_rede
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  dashboard-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3010:80"
    networks:
      - minha_rede
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  minha_rede:
    external: true
